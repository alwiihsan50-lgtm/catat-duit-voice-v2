<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catat Duit Voice</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #fff;
      --text: #17202a;
      --muted: #687382;
      --line: #dce2ea;
      --green: #167a57;
      --red: #c2413b;
      --blue: #275bb5;
      --amber: #a15c00;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    .app { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0; }
    header, .topline, .actions, .family-row { display: flex; align-items: center; gap: 10px; }
    header { justify-content: space-between; margin-bottom: 18px; }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: clamp(28px, 4vw, 44px); line-height: 1.05; }
    h2 { font-size: 16px; }
    p { margin: 6px 0 0; color: var(--muted); line-height: 1.5; }
    section, .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(28, 39, 54, .06);
    }
    section { padding: 16px; }
    .stats, .grid { display: grid; gap: 16px; }
    .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 16px; }
    .grid { grid-template-columns: minmax(0, 1fr) 390px; align-items: start; }
    .stat { padding: 12px; }
    .stat small, label { color: var(--muted); font-size: 13px; font-weight: 700; }
    .stat strong { display: block; margin-top: 6px; font-size: 19px; }
    .voice { display: grid; gap: 13px; }
    .mic {
      width: 100%;
      min-height: 116px;
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: white;
      cursor: pointer;
      font-size: 20px;
      font-weight: 800;
      display: grid;
      place-items: center;
      gap: 8px;
    }
    .mic[aria-pressed="true"] { background: var(--red); }
    .mic svg { width: 34px; height: 34px; }
    label { display: grid; gap: 6px; }
    input, textarea, select, button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--text);
      font: inherit;
    }
    input, textarea, select { width: 100%; padding: 10px 12px; }
    textarea { min-height: 88px; resize: vertical; }
    button { padding: 0 13px; cursor: pointer; font-weight: 750; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .primary { border-color: var(--blue); background: var(--blue); color: white; }
    .danger { color: var(--red); }
    .form { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .wide { grid-column: 1 / -1; }
    .family { margin-bottom: 16px; }
    .family-row { align-items: end; flex-wrap: wrap; margin-top: 12px; }
    .family-row label { flex: 1 1 220px; }
    .status { min-height: 24px; color: var(--amber); font-size: 14px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 11px 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; }
    td.amount { text-align: right; font-weight: 850; white-space: nowrap; }
    .income { color: var(--green); }
    .expense { color: var(--red); }
    .empty { color: var(--muted); text-align: center; padding: 26px 8px; }
    .hidden { display: none; }
    @media (max-width: 860px) {
      .app { width: min(100% - 20px, 640px); padding-top: 18px; }
      header, .grid, .stats, .form { grid-template-columns: 1fr; display: grid; }
      .topline { flex-wrap: wrap; }
      th:nth-child(1), td:nth-child(1) { display: none; }
      section { padding: 13px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Catat Duit Voice</h1>
        <p id="familyLine">Masuk pakai email owner keluarga.</p>
      </div>
      <button id="logoutBtn" class="hidden">Ganti Email</button>
    </header>

    <section id="familyGate" class="family">
      <h2>Email keluarga</h2>
      <p>Satu email membuat satu keluarga. Kalau email sudah ada, app langsung membuka data keluarga itu.</p>
      <div class="family-row">
        <label>Email owner
          <input id="ownerEmail" type="email" autocomplete="email" placeholder="nama@email.com">
        </label>
        <label>Nama keluarga
          <input id="familyName" autocomplete="organization" placeholder="Keluarga Alwi">
        </label>
        <button id="familyBtn" class="primary">Masuk / Buat</button>
      </div>
    </section>

    <div id="mainApp" class="hidden">
      <div class="stats">
        <div class="stat"><small>Saldo</small><strong id="balance">Rp0</strong></div>
        <div class="stat"><small>Masuk</small><strong id="income">Rp0</strong></div>
        <div class="stat"><small>Keluar</small><strong id="expense">Rp0</strong></div>
      </div>

      <div class="grid">
        <section class="voice">
          <button class="mic" id="micBtn" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a4 4 0 0 0 4-4V7a4 4 0 0 0-8 0v3a4 4 0 0 0 4 4Zm7-4a7 7 0 0 1-14 0m7 7v4m-4 0h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span id="micText">Voice On</span>
          </button>

          <label>Hasil suara / teks cepat
            <textarea id="rawText" autocomplete="off" placeholder="Contoh: pengeluaran 15000 makan, pemasukan 1jt gaji"></textarea>
          </label>

          <div class="form">
            <label>Tipe
              <select id="type">
                <option value="expense">Pengeluaran</option>
                <option value="income">Pemasukan</option>
              </select>
            </label>
            <label>Nominal
              <input id="amount" inputmode="numeric" autocomplete="off" placeholder="15000">
            </label>
            <label class="wide">Catatan
              <input id="note" autocomplete="off" placeholder="Makan siang">
            </label>
          </div>

          <div class="actions">
            <button class="primary" id="saveBtn">Simpan</button>
            <button id="parseBtn">Baca Teks</button>
            <button class="danger" id="clearBtn">Hapus Riwayat</button>
          </div>
          <div class="status" id="status"></div>
        </section>

        <section>
          <div class="topline">
            <h2>Riwayat</h2>
            <select id="filter" aria-label="Filter riwayat">
              <option value="all">Semua</option>
              <option value="income">Pemasukan</option>
              <option value="expense">Pengeluaran</option>
            </select>
          </div>
          <table>
            <thead><tr><th>Tanggal</th><th>Catatan</th><th>Nominal</th></tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </section>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.87.1";

    const SUPABASE_URL = "https://ajlkfzgpheegmwsnspxw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbGtmemdwaGVlZ213c25zcHh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNzA2NzYsImV4cCI6MjA5NjY0NjY3Nn0.hz-BhOjBbuOa8l-yvRFbB4VE81VODWAZfAiwIaPlVWw";
    const FAMILY_KEY = "catat-duit-voice-family";

    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);
    const money = new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", maximumFractionDigits: 0 });

    let family = JSON.parse(localStorage.getItem(FAMILY_KEY) || "null");
    let entries = [];
    let recognition;
    let listening = false;

    const rupiah = (n) => money.format(n).replace(/\s/g, "");
    const setStatus = (text) => $("status").textContent = text;

    async function requestMicPermission() {
      if (!navigator.mediaDevices?.getUserMedia) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach((track) => track.stop());
      } catch {
        setStatus("Izin mic belum aktif. Tekan tombol voice untuk coba lagi.");
      }
    }

    function normalizeEmail(value) {
      return value.trim().toLowerCase();
    }

    async function enterFamily() {
      const ownerEmail = normalizeEmail($("ownerEmail").value);
      const name = $("familyName").value.trim() || ownerEmail.split("@")[0] || "Keluarga";
      if (!ownerEmail || !ownerEmail.includes("@")) return setStatus("Email owner belum valid.");

      $("familyBtn").disabled = true;
      try {
        const { data: existing, error: findError } = await db
          .from("catat_duit_voice_families")
          .select("*")
          .eq("owner_email", ownerEmail)
          .maybeSingle();
        if (findError) throw findError;

        if (existing) {
          family = existing;
        } else {
          const { data: created, error: createError } = await db
            .from("catat_duit_voice_families")
            .insert({ owner_email: ownerEmail, name })
            .select()
            .single();
          if (createError) throw createError;
          family = created;
        }

        localStorage.setItem(FAMILY_KEY, JSON.stringify(family));
        showApp();
        await loadEntries();
      } catch (error) {
        setStatus(error.message || "Gagal masuk keluarga.");
      } finally {
        $("familyBtn").disabled = false;
      }
    }

    function showApp() {
      $("familyGate").classList.toggle("hidden", !!family);
      $("mainApp").classList.toggle("hidden", !family);
      $("logoutBtn").classList.toggle("hidden", !family);
      $("familyLine").textContent = family ? `${family.name} - ${family.owner_email}` : "Masuk pakai email owner keluarga.";
    }

    async function loadEntries() {
      if (!family) return;
      const { data, error } = await db
        .from("catat_duit_voice_transactions")
        .select("*")
        .eq("family_id", family.id)
        .order("happened_at", { ascending: false });
      if (error) return setStatus(error.message);
      entries = data || [];
      render();
    }

    function parseMoney(text) {
      const normalized = text.toLowerCase();
      const match = normalized.match(/\b(\d+(?:[.,]\d{1,3})*)\s*(jt|rb|k)\b|\b(\d+(?:[.,]\d{1,3})*)\s*(juta|ribu)?\b/);
      if (!match) return 0;

      const raw = match[1] || match[3];
      const unit = ({ jt: "juta", rb: "ribu", k: "ribu" }[match[2]] || match[4] || "");
      let number;

      if (unit) {
        number = Number(raw.replace(",", "."));
      } else if (/^\d{1,3}([.,]\d{3})+$/.test(raw)) {
        number = Number(raw.replace(/[.,]/g, ""));
      } else {
        number = Number(raw.replace(/[^\d]/g, ""));
      }

      const multiplier = unit === "juta" ? 1000000 : unit === "ribu" ? 1000 : 1;
      return Math.round(number * multiplier) || 0;
    }

    function parseText() {
      const text = $("rawText").value.trim();
      if (!text) return setStatus("Teks masih kosong.");
      const lower = text.toLowerCase();
      const type = /masuk|pemasukan|gaji|terima|income/.test(lower) ? "income" : "expense";
      const amount = parseMoney(lower);
      const note = text
        .replace(/\d+(?:[.,]\d{1,3})*\s*(juta|jt|ribu|rb|k)?/i, "")
        .replace(/pengeluaran|pemasukan|keluar|masuk|income|expense|beli|bayar/ig, "")
        .trim() || (type === "income" ? "Pemasukan" : "Pengeluaran");

      $("type").value = type;
      $("amount").value = amount || "";
      $("note").value = note;
      setStatus(amount ? "Teks terbaca. Cek lalu simpan." : "Nominal belum ketemu.");
      return { type, amount, note };
    }

    async function saveEntry() {
      if (!family) return setStatus("Masuk email keluarga dulu.");
      const amount = Number(String($("amount").value).replace(/[^\d]/g, ""));
      const note = $("note").value.trim();
      if (!amount || !note) return setStatus("Nominal dan catatan wajib diisi.");

      const { error } = await db.from("catat_duit_voice_transactions").insert({
        family_id: family.id,
        type: $("type").value,
        note,
        amount,
      });
      if (error) return setStatus(error.message);

      $("rawText").value = $("amount").value = $("note").value = "";
      setStatus("Tersimpan.");
      await loadEntries();
    }

    async function clearEntries() {
      if (!family || !entries.length || !confirm("Hapus semua riwayat keluarga ini?")) return;
      const { error } = await db.from("catat_duit_voice_transactions").delete().eq("family_id", family.id);
      if (error) return setStatus(error.message);
      entries = [];
      render();
      setStatus("Riwayat dihapus.");
    }

    function render() {
      const totals = entries.reduce((acc, item) => {
        acc[item.type] += item.amount;
        return acc;
      }, { income: 0, expense: 0 });
      $("income").textContent = rupiah(totals.income);
      $("expense").textContent = rupiah(totals.expense);
      $("balance").textContent = rupiah(totals.income - totals.expense);

      const visible = entries.filter((item) => $("filter").value === "all" || item.type === $("filter").value);
      $("rows").replaceChildren();
      if (!visible.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.className = "empty";
        td.colSpan = 3;
        td.textContent = "Belum ada catatan.";
        tr.append(td);
        $("rows").append(tr);
        return;
      }

      for (const item of visible) {
        const tr = document.createElement("tr");
        const date = document.createElement("td");
        const note = document.createElement("td");
        const amount = document.createElement("td");
        date.textContent = new Date(item.happened_at).toLocaleDateString("id-ID");
        note.textContent = item.note;
        amount.className = `amount ${item.type}`;
        amount.textContent = `${item.type === "income" ? "+" : "-"}${rupiah(item.amount)}`;
        tr.append(date, note, amount);
        $("rows").append(tr);
      }
    }

    function setupRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return null;
      const rec = new SpeechRecognition();
      rec.lang = "id-ID";
      rec.continuous = true;
      rec.interimResults = false;
      rec.onresult = (event) => {
        const last = event.results[event.results.length - 1][0].transcript;
        $("rawText").value = last;
        parseText();
      };
      rec.onend = () => {
        if (listening) rec.start();
      };
      rec.onerror = () => setStatus("Voice gagal. Coba lagi atau ketik manual.");
      return rec;
    }

    function toggleVoice() {
      recognition ||= setupRecognition();
      if (!recognition) return setStatus("Voice belum didukung browser ini. Pakai Chrome.");
      listening = !listening;
      $("micBtn").setAttribute("aria-pressed", String(listening));
      $("micText").textContent = listening ? "Voice Off" : "Voice On";
      if (listening) {
        recognition.start();
        setStatus("Voice aktif.");
      } else {
        recognition.stop();
        setStatus("Voice berhenti.");
      }
    }

    $("familyBtn").onclick = enterFamily;
    $("logoutBtn").onclick = () => {
      localStorage.removeItem(FAMILY_KEY);
      family = null;
      entries = [];
      showApp();
      render();
    };
    $("micBtn").onclick = toggleVoice;
    $("parseBtn").onclick = parseText;
    $("saveBtn").onclick = saveEntry;
    $("clearBtn").onclick = clearEntries;
    $("filter").onchange = render;
    $("ownerEmail").onkeydown = (event) => { if (event.key === "Enter") enterFamily(); };
    $("familyName").onkeydown = (event) => { if (event.key === "Enter") enterFamily(); };

    requestMicPermission();
    showApp();
    if (family) loadEntries();
  </script>
</body>
</html>
